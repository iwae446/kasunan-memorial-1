<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思い出を文章に｜公民館 閉館記念</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f5f0;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #3B6D11;
      color: #EAF3DE;
      padding: 1.2rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; }
    header p  { font-size: 0.8rem; color: #C0DD97; }

    .step-bar {
      display: flex;
      gap: 5px;
      padding: 12px 1.5rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .step-bar span {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: #ddd;
      transition: background 0.3s;
    }
    .step-bar span.done   { background: #639922; }
    .step-bar span.active { background: #97C459; }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem 1.2rem 4rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.4rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .q-number {
      font-size: 0.75rem;
      color: #639922;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .q-text {
      font-size: 1rem;
      font-weight: bold;
      line-height: 1.5;
      margin-bottom: 6px;
      color: #222;
    }
    .q-hint {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    /* テキストエリアとマイクボタンのラッパー */
    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px 48px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 110px;
      line-height: 1.6;
      color: #333;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #639922;
    }
    textarea::placeholder { color: #bbb; }
    textarea.listening {
      border-color: #e74c3c;
      background: #fff8f8;
    }

    /* マイクボタン */
    .mic-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #639922;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.recording {
      background: #e74c3c;
      animation: pulse 1s ease-in-out infinite;
    }
    .mic-btn.unsupported {
      background: #bbb;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
      100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    }

    /* 音声認識ステータス */
    .voice-status {
      font-size: 0.78rem;
      color: #e74c3c;
      margin-top: 5px;
      min-height: 18px;
      text-align: right;
    }
    .voice-status.idle { color: #aaa; }

    /* 音声非対応メッセージ */
    .voice-unsupported {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 5px;
      display: none;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #639922; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: #fff;
      color: #666;
      border: 1.5px solid #ddd;
    }
    .btn-copy {
      background: #3B6D11;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 2rem 0;
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #ddd;
      border-top-color: #639922;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #666; font-size: 0.9rem; }

    .result-box {
      background: #f9f7f2;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 1.2rem;
      font-size: 0.95rem;
      line-height: 1.9;
      color: #333;
      margin-bottom: 1.2rem;
      white-space: pre-wrap;
    }
    .result-note {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      margin-bottom: 1rem;
    }

    .copied-msg {
      text-align: center;
      color: #639922;
      font-size: 0.85rem;
      margin-top: 8px;
      min-height: 20px;
    }

    .error-box {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 1rem;
      color: #c0392b;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>

<header>
  <h1>思い出を文章にする</h1>
  <p>〇〇公民館 閉館記念</p>
</header>

<div class="step-bar" id="stepBar">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">

  <!-- 質問画面 -->
  <div id="screen-questions" class="screen active">
    <div class="card">
      <p class="q-number" id="qNumber">質問 1 / 5</p>
      <p class="q-text"   id="qText"></p>
      <p class="q-hint"   id="qHint"></p>

      <div class="textarea-wrap">
        <textarea id="qAnswer" placeholder=""></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="マイクで話す">
          🎤
        </button>
      </div>
      <p class="voice-status idle" id="voiceStatus">🎤 マイクボタンで話して入力できます</p>
      <p class="voice-unsupported" id="voiceUnsupported">※ このブラウザは音声入力に対応していません</p>
    </div>

    <button class="btn btn-primary" id="btnNext" onclick="nextStep()">次へ →</button>
    <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" style="display:none">← 前に戻る</button>
  </div>

  <!-- 生成中 -->
  <div id="screen-loading" class="screen">
    <div class="card">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Claudeがあなたの思い出を<br>文章にしています…</p>
        <p style="font-size:0.8rem;color:#aaa;margin-top:8px;">しばらくお待ちください</p>
      </div>
    </div>
  </div>

  <!-- 結果 -->
  <div id="screen-result" class="screen">
    <div class="card">
      <p class="q-number" style="margin-bottom:10px">✅ 文章ができました</p>
      <p class="q-hint">以下の文章をコピーして、担当者にお送りください。</p>
      <div class="result-box" id="resultText"></div>
      <p class="result-note">※ 内容を修正したい場合は担当者にご相談ください</p>
      <button class="btn btn-copy" onclick="copyText()">
        📋 文章をコピーする
      </button>
      <p class="copied-msg" id="copiedMsg"></p>
    </div>
    <button class="btn btn-secondary" onclick="restart()" style="margin-top:10px">
      🔄 最初からやり直す
    </button>
  </div>

  <!-- エラー -->
  <div id="screen-error" class="screen">
    <div class="card">
      <p class="q-number" style="color:#c0392b">⚠️ エラーが発生しました</p>
      <div class="error-box" id="errorMsg"></div>
      <button class="btn btn-secondary" onclick="restart()">最初からやり直す</button>
    </div>
  </div>

</div>

<script>

// ================================================
// 質問リスト
// ================================================
const QUESTIONS = [
  {
    text: "公民館を使い始めたのはいつ頃ですか？また、きっかけは何でしたか？",
    hint: "例）子どもが小さい頃から／友人に誘われて料理教室に参加したのが始まりです",
    placeholder: "いつ頃・きっかけを教えてください（箇条書きでもOK）"
  },
  {
    text: "公民館でどんな活動や行事に参加しましたか？",
    hint: "例）料理教室、囲碁サークル、子どものお遊戯会、防災訓練など",
    placeholder: "参加した活動をいくつでも書いてください"
  },
  {
    text: "公民館で出会った人や、印象に残っているエピソードはありますか？",
    hint: "例）長年一緒だったサークルの仲間、職員の方との思い出など",
    placeholder: "印象深い人やエピソードを教えてください"
  },
  {
    text: "公民館はあなたにとってどんな場所でしたか？",
    hint: "例）第二の我が家のような場所、地域のつながりを感じられる場所など",
    placeholder: "あなたにとっての公民館を教えてください"
  },
  {
    text: "公民館へのメッセージ、または地域の未来へのひとことをお願いします。",
    hint: "例）長い間ありがとう、これからも地域のきずなを大切に、など",
    placeholder: "感謝の言葉や未来へのメッセージを自由に"
  }
];

// ================================================
// 状態管理
// ================================================
let currentStep = 0;
const answers = { q1: "", q2: "", q3: "", q4: "", q5: "" };

// ================================================
// 音声入力（Web Speech API）
// ================================================
let recognition = null;
let isListening = false;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    // 非対応ブラウザの場合
    document.getElementById("micBtn").classList.add("unsupported");
    document.getElementById("micBtn").disabled = true;
    document.getElementById("voiceStatus").style.display = "none";
    document.getElementById("voiceUnsupported").style.display = "block";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;  // 認識途中の結果も取得
  recognition.continuous = false;     // 一区切りで自動停止

  // 認識中：テキストを随時更新
  recognition.onresult = function(event) {
    let interim = "";
    let final = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += transcript;
      } else {
        interim += transcript;
      }
    }
    const textarea = document.getElementById("qAnswer");
    // 確定済みテキストを追記（既存テキストの末尾に）
    if (final) {
      const existing = textarea.value;
      textarea.value = existing + (existing && !existing.endsWith("\n") ? "\n" : "") + final;
    }
    if (interim) {
      document.getElementById("voiceStatus").textContent = "🎤 認識中：" + interim;
    }
  };

  // 認識終了
  recognition.onend = function() {
    isListening = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("qAnswer").classList.remove("listening");
    document.getElementById("voiceStatus").textContent = "🎤 マイクボタンで話して入力できます";
    document.getElementById("voiceStatus").className = "voice-status idle";
    document.getElementById("micBtn").textContent = "🎤";
  };

  // エラー処理
  recognition.onerror = function(event) {
    isListening = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("qAnswer").classList.remove("listening");
    document.getElementById("micBtn").textContent = "🎤";

    let msg = "🎤 マイクボタンで話して入力できます";
    if (event.error === "not-allowed") {
      msg = "⚠️ マイクの使用が許可されていません。ブラウザの設定をご確認ください";
    } else if (event.error === "no-speech") {
      msg = "声が聞こえませんでした。もう一度お試しください";
    }
    document.getElementById("voiceStatus").textContent = msg;
    document.getElementById("voiceStatus").className = "voice-status idle";
  };
}

// マイクボタンのON/OFF切り替え
function toggleVoice() {
  if (!recognition) return;

  if (isListening) {
    // 録音停止
    recognition.stop();
    isListening = false;
  } else {
    // 録音開始
    try {
      recognition.start();
      isListening = true;
      document.getElementById("micBtn").classList.add("recording");
      document.getElementById("micBtn").textContent = "⏹";
      document.getElementById("qAnswer").classList.add("listening");
      document.getElementById("voiceStatus").textContent = "🔴 録音中…話してください（終わったらボタンを押す）";
      document.getElementById("voiceStatus").className = "voice-status";
    } catch(e) {
      document.getElementById("voiceStatus").textContent = "エラーが発生しました。再度お試しください";
    }
  }
}

// ================================================
// 画面・質問の制御
// ================================================
window.onload = function() {
  initVoice();
  showQuestion(0);
};

function showQuestion(index) {
  // 録音中なら停止
  if (isListening && recognition) recognition.stop();

  const q = QUESTIONS[index];
  document.getElementById("qNumber").textContent  = `質問 ${index + 1} / ${QUESTIONS.length}`;
  document.getElementById("qText").textContent    = q.text;
  document.getElementById("qHint").textContent    = q.hint;
  document.getElementById("qAnswer").placeholder  = q.placeholder;
  document.getElementById("qAnswer").value        = answers[`q${index + 1}`] || "";

  document.getElementById("btnPrev").style.display = index > 0 ? "block" : "none";
  document.getElementById("btnNext").textContent   = index === QUESTIONS.length - 1 ? "文章を作る ✨" : "次へ →";

  updateStepBar(index);
  showScreen("screen-questions");
}

function updateStepBar(activeIndex) {
  const spans = document.querySelectorAll("#stepBar span");
  spans.forEach((span, i) => {
    span.className = i < activeIndex ? "done" : i === activeIndex ? "active" : "";
  });
}

function nextStep() {
  if (isListening && recognition) recognition.stop();
  answers[`q${currentStep + 1}`] = document.getElementById("qAnswer").value.trim();
  if (currentStep === QUESTIONS.length - 1) {
    generateText();
  } else {
    currentStep++;
    showQuestion(currentStep);
  }
}

function prevStep() {
  if (isListening && recognition) recognition.stop();
  answers[`q${currentStep + 1}`] = document.getElementById("qAnswer").value.trim();
  currentStep--;
  showQuestion(currentStep);
}

// ================================================
// 文章生成（google.script.run を使う版）
// ================================================
function generateText() {
  showScreen("screen-loading");

  google.script.run
    .withSuccessHandler(function(result) {
      if (result.error) {
        document.getElementById("errorMsg").textContent = result.error;
        showScreen("screen-error");
      } else {
        document.getElementById("resultText").textContent = result.text;
        showScreen("screen-result");
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById("errorMsg").textContent =
        "エラーが発生しました。\n" + err.message + "\n\n時間をおいてもう一度お試しください。";
      showScreen("screen-error");
    })
    .generateFromAnswers(answers);  // コード.gs の関数を直接呼ぶ
}

// ================================================
// コピー・リスタート
// ================================================
function copyText() {
  const text = document.getElementById("resultText").textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById("copiedMsg").textContent = "✅ コピーしました！";
    setTimeout(() => { document.getElementById("copiedMsg").textContent = ""; }, 3000);
  }).catch(() => {
    const el = document.createElement("textarea");
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    document.getElementById("copiedMsg").textContent = "✅ コピーしました！";
  });
}

function restart() {
  currentStep = 0;
  Object.keys(answers).forEach(k => answers[k] = "");
  showQuestion(0);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("stepBar").style.display =
    id === "screen-questions" ? "flex" : "none";
}
</script>

</body>
</html>

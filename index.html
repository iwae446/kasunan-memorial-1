<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>思い出を文章に</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f0f0eb;
      color: #222;
      font-size: 20px;
      /* キーボードが出ても画面が縮まないよう固定 */
      min-height: 100vh;
    }

    header {
      background: #3B6D11;
      color: #EAF3DE;
      padding: 1rem 1.2rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.15rem; font-weight: bold; }

    /* ステップバー */
    .step-bar {
      display: flex;
      gap: 5px;
      padding: 10px 1.2rem;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    .step-bar span {
      flex: 1; height: 7px; border-radius: 4px; background: #ddd;
      transition: background 0.3s;
    }
    .step-bar span.done   { background: #639922; }
    .step-bar span.active { background: #97C459; }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 1.2rem 1rem 6rem;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.4rem 1.2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .q-number {
      font-size: 0.85rem;
      color: #639922;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 1.15rem;
      font-weight: bold;
      line-height: 1.6;
      margin-bottom: 10px;
      color: #111;
    }
    .q-hint {
      font-size: 0.88rem;
      color: #999;
      margin-bottom: 14px;
      line-height: 1.55;
    }

    /* テキストエリア：OS標準マイク使用前提でシンプルに */
    textarea {
      width: 100%;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      font-size: 1.05rem;
      font-family: inherit;
      resize: none;
      min-height: 130px;
      line-height: 1.75;
      color: #222;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    textarea:focus { outline: none; border-color: #639922; }
    textarea::placeholder { color: #bbb; font-size: 0.95rem; }

    .mic-hint {
      font-size: 0.82rem;
      color: #aaa;
      margin-top: 8px;
      text-align: right;
      line-height: 1.4;
    }

    /* ボタン：大きく・押しやすく */
    .btn {
      display: block;
      width: 100%;
      padding: 18px 12px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary   { background: #639922; color: #fff; }
    .btn-secondary { background: #fff; color: #555; border: 2px solid #ccc; }
    .btn-print     { background: #3B6D11; color: #fff; }
    .btn-improve   { background: #e67e22; color: #fff; }
    .btn:disabled  { opacity: 0.4; cursor: not-allowed; }

    /* ローディング */
    .loading { text-align: center; padding: 3rem 0; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid #ddd;
      border-top-color: #639922;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #666; font-size: 1rem; line-height: 1.8; }

    /* 結果表示 */
    .result-label {
      font-size: 0.85rem;
      color: #639922;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .result-box {
      background: #f9f7f2;
      border: 2px solid #e0dbd0;
      border-radius: 10px;
      padding: 1.2rem;
      font-size: 1rem;
      line-height: 2.1;
      color: #222;
      margin-bottom: 1.2rem;
      white-space: pre-wrap;
    }
    .copied-msg {
      text-align: center;
      color: #639922;
      font-size: 0.9rem;
      margin-bottom: 12px;
      min-height: 22px;
    }

    /* 文章改善画面 */
    .improve-label {
      font-size: 1rem;
      font-weight: bold;
      color: #222;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .improve-examples {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 14px;
      line-height: 1.7;
    }

    /* エラー */
    .error-box {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 10px;
      padding: 1rem;
      color: #c0392b;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* 印刷 */
    @media print {
      header, .step-bar, .btn, .copied-msg, .result-label { display: none !important; }
      body { background: #fff; font-size: 13pt; }
      .container { padding: 0; max-width: 100%; }
      .card { box-shadow: none; padding: 0; border: none; }
      .result-box {
        border: none; background: #fff;
        font-size: 13pt; line-height: 2.2; padding: 0;
      }
      #screen-result { display: block !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>思い出を文章に</h1>
</header>

<div class="step-bar" id="stepBar">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">

  <!-- ===== 質問画面 ===== -->
  <div id="screen-questions" class="screen active">
    <div class="card">
      <p class="q-number" id="qNumber">質問 1 / 5</p>
      <p class="q-text"   id="qText"></p>
      <p class="q-hint"   id="qHint"></p>
      <textarea id="qAnswer" rows="5" placeholder=""></textarea>
      <p class="mic-hint">📱 キーボードのマイクボタンで話して入力できます</p>
    </div>
    <button class="btn btn-primary"   id="btnNext" onclick="nextStep()">次へ →</button>
    <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" style="display:none">← 前に戻る</button>
  </div>

  <!-- ===== 生成中 ===== -->
  <div id="screen-loading" class="screen">
    <div class="card">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>あなたの思い出を<br>文章にしています…</p>
        <p style="font-size:0.85rem;color:#bbb;margin-top:12px;">しばらくお待ちください</p>
      </div>
    </div>
  </div>

  <!-- ===== 結果 ===== -->
  <div id="screen-result" class="screen">
    <div class="card">
      <p class="result-label">✅ 文章ができました</p>
      <div class="result-box" id="resultText"></div>
      <p class="copied-msg"  id="copiedMsg"></p>
      <button class="btn btn-print"   onclick="printText()">🖨️ 印刷する</button>
      <button class="btn btn-improve" onclick="showImprove()">✏️ この文章をもっと良くしたい</button>
    </div>
    <button class="btn btn-secondary" onclick="restart()" style="margin-top:4px">🔄 最初からやり直す</button>
  </div>

  <!-- ===== 文章改善画面 ===== -->
  <div id="screen-improve" class="screen">
    <div class="card">
      <p class="improve-label">どのように直しますか？<br>思ったことを自由に書いてください</p>
      <p class="improve-examples">
        例）<br>
        ・もう少し短くしてほしい<br>
        ・料理教室のことをもっと詳しく書いて<br>
        ・やわらかい雰囲気にしてほしい<br>
        ・最後をもっと明るい感じにしたい
      </p>
      <textarea id="improveInput" rows="4" placeholder="ここに書いてください"></textarea>
      <p class="mic-hint">📱 キーボードのマイクボタンで話して入力できます</p>
    </div>
    <button class="btn btn-primary"   onclick="refineText()">✨ 書き直してもらう</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-result')">← 文章に戻る</button>
  </div>

  <!-- ===== 改善生成中 ===== -->
  <div id="screen-refining" class="screen">
    <div class="card">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>文章を書き直しています…</p>
        <p style="font-size:0.85rem;color:#bbb;margin-top:12px;">しばらくお待ちください</p>
      </div>
    </div>
  </div>

  <!-- ===== エラー ===== -->
  <div id="screen-error" class="screen">
    <div class="card">
      <p class="result-label" style="color:#c0392b">⚠️ エラーが発生しました</p>
      <div class="error-box" id="errorMsg"></div>
      <button class="btn btn-secondary" onclick="restart()">最初からやり直す</button>
    </div>
  </div>

</div><!-- /container -->

<script>
// ================================================
// ★ GASのWebアプリURLをここに貼り付けてください
// ================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbxOVNRyD11JkcB7jBvC6l5QsH0volsi8JPTOb0ir0RZcjQjJ2yvMkZ_I5-Dd-lJ5go/exec";

// ================================================
// 質問リスト
// ================================================
const QUESTIONS = [
  {
    text: "公民館を使い始めたのはいつ頃ですか？また、きっかけは何でしたか？",
    hint: "例）子どもが小さい頃から　／　友人に誘われて料理教室に参加したのが始まりです",
    placeholder: "いつ頃・きっかけを書いてください（箇条書きでもOK）"
  },
  {
    text: "公民館でどんな活動や行事に参加しましたか？",
    hint: "例）料理教室、囲碁サークル、子どものお遊戯会、防災訓練　など",
    placeholder: "参加した活動をいくつでも書いてください"
  },
  {
    text: "公民館で出会った人や、印象に残っているエピソードはありますか？",
    hint: "例）長年一緒だったサークルの仲間　／　職員の方との思い出",
    placeholder: "印象深い人やエピソードを書いてください"
  },
  {
    text: "公民館はあなたにとってどんな場所でしたか？",
    hint: "例）第二の我が家のような場所　／　地域のつながりを感じられる場所",
    placeholder: "あなたにとっての公民館を書いてください"
  },
  {
    text: "公民館へのメッセージ、または地域の未来へのひとことをお願いします。",
    hint: "例）長い間ありがとう　／　これからも地域のきずなを大切に",
    placeholder: "感謝の言葉や未来へのメッセージを自由に"
  }
];

// ================================================
// 状態管理
// ================================================
let currentStep = 0;
const answers = { q1:"", q2:"", q3:"", q4:"", q5:"" };
let currentGeneratedText = ""; // 現在生成されている文章

// ================================================
// 初期化
// ================================================
window.onload = function() {
  showQuestion(0);
};

// ================================================
// 質問画面
// ================================================
function showQuestion(index) {
  const q = QUESTIONS[index];
  document.getElementById("qNumber").textContent = `質問 ${index + 1} / ${QUESTIONS.length}`;
  document.getElementById("qText").textContent   = q.text;
  document.getElementById("qHint").textContent   = q.hint;
  const ta = document.getElementById("qAnswer");
  ta.placeholder = q.placeholder;
  ta.value       = answers[`q${index + 1}`] || "";
  document.getElementById("btnPrev").style.display = index > 0 ? "block" : "none";
  document.getElementById("btnNext").textContent   = index === QUESTIONS.length - 1 ? "文章を作る ✨" : "次へ →";
  updateStepBar(index);
  showScreen("screen-questions");
  // 少し遅らせてスクロールをトップに
  setTimeout(() => window.scrollTo(0, 0), 50);
}

function updateStepBar(activeIndex) {
  document.querySelectorAll("#stepBar span").forEach((span, i) => {
    span.className = i < activeIndex ? "done" : i === activeIndex ? "active" : "";
  });
}

function nextStep() {
  answers[`q${currentStep + 1}`] = document.getElementById("qAnswer").value.trim();
  if (currentStep === QUESTIONS.length - 1) {
    generateText();
  } else {
    currentStep++;
    showQuestion(currentStep);
  }
}

function prevStep() {
  answers[`q${currentStep + 1}`] = document.getElementById("qAnswer").value.trim();
  currentStep--;
  showQuestion(currentStep);
}

// ================================================
// 文章生成（初回）
// ================================================
async function generateText() {
  showScreen("screen-loading");
  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ answers }),
      redirect: "follow"
    });
    if (!response.ok) throw new Error(`通信エラー（${response.status}）`);
    const data = await response.json();
    if (data.error) throw new Error(data.error);

    currentGeneratedText = data.text;
    showResult(currentGeneratedText);

  } catch (err) {
    showError(err.message);
  }
}

// ================================================
// 文章改善
// ================================================
function showImprove() {
  document.getElementById("improveInput").value = "";
  showScreen("screen-improve");
  setTimeout(() => window.scrollTo(0, 0), 50);
}

async function refineText() {
  const request = document.getElementById("improveInput").value.trim();
  if (!request) {
    alert("どのように直したいか、上の欄に書いてください。");
    return;
  }
  showScreen("screen-refining");
  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        answers,
        refine: true,
        currentText: currentGeneratedText,
        request: request
      }),
      redirect: "follow"
    });
    if (!response.ok) throw new Error(`通信エラー（${response.status}）`);
    const data = await response.json();
    if (data.error) throw new Error(data.error);

    currentGeneratedText = data.text;
    showResult(currentGeneratedText);

  } catch (err) {
    showError(err.message);
  }
}

// ================================================
// 結果表示（クリップボード自動コピー）
// ================================================
function showResult(text) {
  document.getElementById("resultText").textContent = text;
  // クリップボードに自動コピー
  try {
    navigator.clipboard.writeText(text).then(() => {
      document.getElementById("copiedMsg").textContent = "📋 クリップボードにコピーしました";
    }).catch(() => fallbackCopy(text));
  } catch(e) {
    fallbackCopy(text);
  }
  showScreen("screen-result");
  setTimeout(() => window.scrollTo(0, 0), 50);
}

function fallbackCopy(text) {
  const el = document.createElement("textarea");
  el.value = text;
  document.body.appendChild(el);
  el.select();
  document.execCommand("copy");
  document.body.removeChild(el);
  document.getElementById("copiedMsg").textContent = "📋 クリップボードにコピーしました";
}

// ================================================
// 印刷・リスタート・エラー
// ================================================
function printText() { window.print(); }

function restart() {
  currentStep = 0;
  currentGeneratedText = "";
  Object.keys(answers).forEach(k => answers[k] = "");
  showQuestion(0);
}

function showError(msg) {
  document.getElementById("errorMsg").textContent =
    `エラーが発生しました。\n${msg}\n\n時間をおいてもう一度お試しください。`;
  showScreen("screen-error");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  const showBar = (id === "screen-questions");
  document.getElementById("stepBar").style.display = showBar ? "flex" : "none";
}
</script>
</body>
</html>

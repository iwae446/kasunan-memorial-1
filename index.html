<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思い出を文章にする</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f5f0;
      color: #333;
      min-height: 100vh;
      font-size: 18px; /* ベースフォントサイズを大きく */
    }

    header {
      background: #3B6D11;
      color: #EAF3DE;
      padding: 1.3rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.2rem; font-weight: bold; margin-bottom: 4px; }
    header p  { font-size: 0.85rem; color: #C0DD97; }

    .step-bar {
      display: flex;
      gap: 5px;
      padding: 12px 1.5rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .step-bar span {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      transition: background 0.3s;
    }
    .step-bar span.done   { background: #639922; }
    .step-bar span.active { background: #97C459; }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem 1.2rem 4rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .q-number {
      font-size: 0.85rem;
      color: #639922;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: bold;
      line-height: 1.6;
      margin-bottom: 8px;
      color: #222;
    }
    .q-hint {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .textarea-wrap { position: relative; }

    textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 12px 14px 54px 14px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
      line-height: 1.7;
      color: #333;
      transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #639922; }
    textarea::placeholder { color: #bbb; }
    textarea.listening { border-color: #e74c3c; background: #fff8f8; }

    .mic-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #639922;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.recording {
      background: #e74c3c;
      animation: pulse 1s ease-in-out infinite;
    }
    .mic-btn.unsupported { background: #bbb; cursor: not-allowed; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
      70%  { box-shadow: 0 0 0 12px rgba(231,76,60,0); }
      100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    }

    .voice-status {
      font-size: 0.85rem;
      color: #e74c3c;
      margin-top: 6px;
      min-height: 20px;
      text-align: right;
    }
    .voice-status.idle { color: #aaa; }
    .voice-unsupported { font-size: 0.85rem; color: #aaa; margin-top: 6px; display: none; }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #639922; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: #fff; color: #666; border: 1.5px solid #ddd; }
    .btn-copy {
      background: #3B6D11;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading { text-align: center; padding: 2.5rem 0; }
    .loading-spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #ddd;
      border-top-color: #639922;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #666; font-size: 1rem; line-height: 1.7; }

    .result-box {
      background: #f9f7f2;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 1.3rem;
      font-size: 1rem;
      line-height: 2;
      color: #333;
      margin-bottom: 1.3rem;
      white-space: pre-wrap;
    }
    .result-note { font-size: 0.85rem; color: #888; text-align: center; margin-bottom: 1rem; }
    .copied-msg { text-align: center; color: #639922; font-size: 0.9rem; margin-top: 8px; min-height: 22px; }

    .error-box {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 1rem;
      color: #c0392b;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>

<header>
  <h1>思い出を文章にする</h1>
  <p></p>
</header>

<div class="step-bar" id="stepBar">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">

  <!-- 質問画面 -->
  <div id="screen-questions" class="screen active">
    <div class="card">
      <p class="q-number" id="qNumber">質問 1 / 5</p>
      <p class="q-text"   id="qText"></p>
      <p class="q-hint"   id="qHint"></p>
      <div class="textarea-wrap">
        <textarea id="qAnswer" placeholder=""></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="マイクで話す">🎤</button>
      </div>
      <p class="voice-status idle" id="voiceStatus">🎤 マイクボタンで話して入力できます</p>
      <p class="voice-unsupported" id="voiceUnsupported">※ このブラウザは音声入力に対応していません</p>
    </div>
    <button class="btn btn-primary" id="btnNext" onclick="nextStep()">次へ →</button>
    <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" style="display:none">← 前に戻る</button>
  </div>

  <!-- 生成中 -->
  <div id="screen-loading" class="screen">
    <div class="card">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Claudeがあなたの思い出を<br>文章にしています…</p>
        <p style="font-size:0.85rem;color:#aaa;margin-top:10px;">しばらくお待ちください</p>
      </div>
    </div>
  </div>

  <!-- 結果 -->
  <div id="screen-result" class="screen">
    <div class="card">
      <p class="q-number" style="margin-bottom:10px">✅ 文章ができました</p>
      <p class="q-hint">以下の文章をコピーして、担当者にお送りください。</p>
      <div class="result-box" id="resultText"></div>
      <p class="result-note">※ 内容を修正したい場合は担当者にご相談ください</p>
      <button class="btn btn-copy" onclick="copyText()">📋 文章をコピーする</button>
      <p class="copied-msg" id="copiedMsg"></p>
    </div>
    <button class="btn btn-secondary" onclick="restart()" style="margin-top:10px">🔄 最初からやり直す</button>
  </div>

  <!-- エラー -->
  <div id="screen-error" class="screen">
    <div class="card">
      <p class="q-number" style="color:#c0392b">⚠️ エラーが発生しました</p>
      <div class="error-box" id="errorMsg"></div>
      <button class="btn btn-secondary" onclick="restart()">最初からやり直す</button>
    </div>
  </div>

</div>

<script>
// ================================================
// ★ GASのWebアプリURLをここに貼り付けてください
// ================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzNoj6V15voyrMiMnx5_b9hmiMknLKFO2U5on2bSEek5HD50gEZjyQpJMMh0Vi3n3KC/exec";

// ================================================
// 質問リスト
// ================================================
const QUESTIONS = [
  {
    text: "公民館を使い始めたのはいつ頃ですか？また、きっかけは何でしたか？",
    hint: "例）子どもが小さい頃から／友人に誘われて料理教室に参加したのが始まりです",
    placeholder: "いつ頃・きっかけを教えてください（箇条書きでもOK）"
  },
  {
    text: "公民館でどんな活動や行事に参加しましたか？",
    hint: "例）料理教室、囲碁サークル、子どものお遊戯会、防災訓練など",
    placeholder: "参加した活動をいくつでも書いてください"
  },
  {
    text: "公民館で出会った人や、印象に残っているエピソードはありますか？",
    hint: "例）長年一緒だったサークルの仲間、職員の方との思い出など",
    placeholder: "印象深い人やエピソードを教えてください"
  },
  {
    text: "公民館はあなたにとってどんな場所でしたか？",
    hint: "例）第二の我が家のような場所、地域のつながりを感じられる場所など",
    placeholder: "あなたにとっての公民館を教えてください"
  },
  {
    text: "公民館へのメッセージ、または地域の未来へのひとことをお願いします。",
    hint: "例）長い間ありがとう、これからも地域のきずなを大切に、など",
    placeholder: "感謝の言葉や未来へのメッセージを自由に"
  }
];

// ================================================
// 状態管理
// ================================================
let currentStep = 0;
const answers = { q1: "", q2: "", q3: "", q4: "", q5: "" };

// ================================================
// 音声入力（待機時間を2倍に延長）
// ================================================
let recognition = null;
let isListening = false;
let silenceTimer = null;
const SILENCE_TIMEOUT = 6000; // 無音検知タイムアウト（通常の約2倍）

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("micBtn").classList.add("unsupported");
    document.getElementById("micBtn").disabled = true;
    document.getElementById("voiceStatus").style.display = "none";
    document.getElementById("voiceUnsupported").style.display = "block";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;
  recognition.continuous = true; // 自動停止せず話し続けられる

  recognition.onresult = function(event) {
    // 話している間はタイマーをリセット（無音検知を延長）
    clearTimeout(silenceTimer);

    let interim = "";
    let final = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) { final += transcript; }
      else { interim += transcript; }
    }
    const textarea = document.getElementById("qAnswer");
    if (final) {
      const existing = textarea.value;
      textarea.value = existing + (existing && !existing.endsWith("\n") ? "\n" : "") + final;
    }
    if (interim) {
      document.getElementById("voiceStatus").textContent = "🎤 認識中：" + interim;
    }

    // 話し終わったあと SILENCE_TIMEOUT 後に自動停止
    silenceTimer = setTimeout(() => {
      if (isListening) recognition.stop();
    }, SILENCE_TIMEOUT);
  };

  recognition.onend = function() {
    clearTimeout(silenceTimer);
    isListening = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("qAnswer").classList.remove("listening");
    document.getElementById("voiceStatus").textContent = "🎤 マイクボタンで話して入力できます";
    document.getElementById("voiceStatus").className = "voice-status idle";
    document.getElementById("micBtn").textContent = "🎤";
  };

  recognition.onerror = function(event) {
    clearTimeout(silenceTimer);
    isListening = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("qAnswer").classList.remove("listening");
    document.getElementById("micBtn").textContent = "🎤";
    let msg = "🎤 マイクボタンで話して入力できます";
    if (event.error === "not-allowed") {
      msg = "⚠️ マイクの使用が許可されていません。ブラウザの設定をご確認ください";
    } else if (event.error === "no-speech") {
      msg = "声が聞こえませんでした。もう一度お試しください";
    }
    document.getElementById("voiceStatus").textContent = msg;
    document.getElementById("voiceStatus").className = "voice-status idle";
  };
}

function toggleVoice() {
  if (!recognition) return;
  if (isListening) {
    clearTimeout(silenceTimer);
    recognition.stop();
    isListening = false;
  } else {
    try {
      recognition.start();
      isListening = true;
      document.getElementById("micBtn").classList.add("recording");
      document.getElementById("micBtn").textContent = "⏹";
      document.getElementById("qAnswer").classList.add("listening");
      document.getElementById("voiceStatus").textContent = "🔴 録音中…話してください（終わったらボタンを押す）";
      document.getElementById("voiceStatus").className = "voice-status";

      // 最初の無音タイマーをセット
      silenceTimer = setTimeout(() => {
        if (isListening) recognition.stop();
      }, SILENCE_TIMEOUT);
    } catch(e) {
      document.getElementById("voiceStatus").textContent = "エラーが発生しました。再度お試しください";
    }
  }
}

// ================================================
// 画面・質問の制御
// ================================================
window.onload = function() {
  initVoice();
  showQuestion(0);
};

function showQuestion(index) {
  if (isListening && recognition) { clearTimeout(silenceTimer); recognition.stop(); }
  const q = QUESTIONS[index];
  document.getElementById("qNumber").textContent  = `質問 ${index + 1} / ${QUESTIONS.length}`;
  document.getElementById("qText").textContent    = q.text;
  document.getElementById("qHint").textContent    = q.hint;
  document.getElementById("qAnswer").placeholder  = q.placeholder;
  document.getElementById("qAnswer").value        = answers[`q${index + 1}`] || "";
  document.getElementById("btnPrev").style.display = index > 0 ? "block" : "none";
  document.getElementById("btnNext").textContent   = index === QUESTIONS.length - 1 ? "文章を作る ✨" : "次へ →";
  updateStepBar(index);
  showScreen("screen-questions");
}

function updateStepBar(activeIndex) {
  const spans = document.querySelectorAll("#stepBar span");
  spans.forEach((span, i) => {
    span.className = i < activeIndex ? "done" : i === activeIndex ? "active" : "";
  });
}

function nextStep() {
  if (isListening && recognition) { clearTimeout(silenceTimer); recognition.stop(); }
  answers[`q${currentStep + 1}`] = document.getElementById("qAnswer").value.trim();
  if (currentStep === QUESTIONS.length - 1) {
    generateText();
  } else {
    currentStep++;
    showQuestion(currentStep);
  }
}

function prevStep() {
  if (isListening && recognition) { clearTimeout(silenceTimer); recognition.stop(); }
  answers[`q${currentStep + 1}`] = document.getElementById("qAnswer").value.trim();
  currentStep--;
  showQuestion(currentStep);
}

// ================================================
// 文章生成（fetch でGASを呼ぶ）
// ================================================
async function generateText() {
  showScreen("screen-loading");
  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ answers }),
      redirect: "follow"
    });
    if (!response.ok) throw new Error(`通信エラー（${response.status}）`);
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    document.getElementById("resultText").textContent = data.text;
    showScreen("screen-result");
  } catch (err) {
    document.getElementById("errorMsg").textContent =
      `エラーが発生しました。\n${err.message}\n\n時間をおいてもう一度お試しください。`;
    showScreen("screen-error");
  }
}

// ================================================
// コピー・リスタート
// ================================================
function copyText() {
  const text = document.getElementById("resultText").textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById("copiedMsg").textContent = "✅ コピーしました！";
    setTimeout(() => { document.getElementById("copiedMsg").textContent = ""; }, 3000);
  }).catch(() => {
    const el = document.createElement("textarea");
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    document.getElementById("copiedMsg").textContent = "✅ コピーしました！";
  });
}

function restart() {
  currentStep = 0;
  Object.keys(answers).forEach(k => answers[k] = "");
  showQuestion(0);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("stepBar").style.display =
    id === "screen-questions" ? "flex" : "none";
}
</script>

</body>
</html>
